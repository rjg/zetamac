name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let one deploy finish; a newer push supersedes an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0          # full history so the commit count is correct

      - name: Assemble site and stamp build version
        run: |
          mkdir _site
          cp -r index.html app-logic.js sw.js manifest.webmanifest icons _site/
          N=$(git rev-list --count HEAD)
          SHA=$(git rev-parse --short HEAD)
          sed -i "s|__BUILD__|build ${N} · ${SHA}|g" _site/index.html
          # Fold app-logic.js into index.html so prod ships one atomic resource
          # (a skewed index.html + app-logic.js cache pair otherwise breaks Z).
          node build-inline.js _site/index.html _site/app-logic.js
          echo "Deployed: build ${N} · ${SHA}"

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
